<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山川的回响 - 视觉小说版</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

<!-- 视觉小说 全屏容器 -->
<div class="vn-container">
  <!-- 背景层 -->
  <div class="vn-bg"></div>

  <!-- 顶部悬浮状态栏 -->
  <div class="vn-status">
    <span>时间：<b id="time">6:30</b></span>
    <span>体力：<b id="stamina">100%</b></span>
    <span>恐惧：<b id="fear">0%</b></span>
    <span>信任：<b id="trust">50%</b></span>
  </div>

  <!-- 控制栏（自动/手动+倍速+重新游玩）-->
  <div class="vn-control">
    <button id="autoBtn" onclick="toggleAuto(); event.stopPropagation()">手动模式</button>
    <select id="speedSelect" onchange="changeSpeed(); event.stopPropagation()">
      <option value="1">慢速</option>
      <option value="2" selected>中速</option>
      <option value="3">快速</option>
    </select>
    <!-- 新增重新游玩按钮 -->
    <button onclick="resetGame(); event.stopPropagation()">重新游玩</button>
  </div>

  <!-- 角色立绘层 -->
  <div class="vn-char">
    <img id="charImg" src="" alt="角色">
  </div>

  <!-- 底部对话框层 -->
  <div class="vn-dialog">
    <div class="vn-name" id="charName"></div>
    <div class="vn-text" id="dialogText"></div>
    <div class="vn-choice" id="choiceBox"></div>
  </div>

  <!-- 答题弹窗 -->
  <div class="vn-quiz" id="quizBox">
    <div class="quiz-window">
      <div class="quiz-title" id="quizTitle"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <button class="quiz-submit" onclick="submitQuiz()">提交答案</button>
    </div>
  </div>

  <!-- 开场日记本 -->
  <div class="vn-start" id="startPanel">
    <div class="diary-box">
      <h3>日记本</h3>
      <p>2021年8月27日 天气小雨</p>
      <button onclick="startGame()">开始体验</button>
    </div>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
